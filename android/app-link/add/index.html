<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>КОФЕМАНИЯ ВПН</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f5efe6;
      color: #3d1c1c;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      width: 100%;
      background: #fff;
      border-radius: 16px;
      padding: 28px 24px;
      box-shadow: 0 8px 24px rgba(61, 28, 28, 0.12);
      text-align: center;
    }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p { margin: 0 0 20px; line-height: 1.5; color: #6b4f4f; }
    a.btn {
      display: block;
      background: #3d1c1c;
      color: #fff;
      text-decoration: none;
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
    }
    .hint { margin-top: 16px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>КОФЕМАНИЯ ВПН</h1>
    <p id="status">Нажмите кнопку, чтобы открыть приложение и подключиться.</p>
    <a id="openBtn" class="btn" href="#">Открыть приложение</a>
    <p class="hint">Если Telegram открыл страницу внутри чата — нажмите ⋮ → «Открыть в браузере» и снова на кнопку.</p>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var token = params.get("token");
      var url = params.get("url");
      if (!url && token) {
        url = "https://sub.coffemaniavpn.online/" + token;
      }
      if (!url) {
        document.getElementById("status").textContent = "Не указан token или url.";
        document.getElementById("openBtn").style.display = "none";
        return;
      }

      var connect = params.get("connect") || "1";
      var encodedUrl = encodeURIComponent(url);
      var cmvpnLink = "cmvpn://add?url=" + encodedUrl + "&connect=" + connect;
      var intentLink =
        "intent://add?url=" + encodedUrl + "&connect=" + connect +
        "#Intent;scheme=cmvpn;package=online.coffemaniavpn.client;end";

      var btn = document.getElementById("openBtn");
      btn.href = intentLink;

      btn.addEventListener("click", function (e) {
        e.preventDefault();
        location.href = intentLink;
        setTimeout(function () {
          location.href = cmvpnLink;
        }, 700);
      });

      // Автопопытка только в обычном браузере, не во встроенном Telegram WebView.
      var ua = navigator.userAgent || "";
      var inTelegram = /Telegram/i.test(ua);
      if (!inTelegram) {
        setTimeout(function () {
          location.href = intentLink;
        }, 300);
      }
    })();
  </script>
</body>
</html>
